<form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="form-container">
  <h2 class="form-header">{{ "AUTH.LOGIN.TITLE" | translate }}</h2>
  <div class="form-group">
    <label for="email" class="label-text">{{
      "AUTH.FIELDS.EMAIL" | translate
    }}</label>
    <input
      id="email"
      type="email"
      formControlName="email"
      [placeholder]="'AUTH.FIELDS.EMAIL' | translate"
    />
    <div *ngIf="f['email'].invalid && f['email'].touched" class="error">
      {{ "AUTH.ERRORS.EMAIL_REQUIRED" | translate }}
    </div>
  </div>

  <div class="form-group">
    <label for="password" class="label-text">{{
      "AUTH.FIELDS.PASSWORD" | translate
    }}</label>
    <input
      id="password"
      type="password"
      formControlName="password"
      [placeholder]="'AUTH.FIELDS.PASSWORD' | translate"
    />
    <div *ngIf="f['password'].invalid && f['password'].touched" class="error">
      {{ "AUTH.ERRORS.PASSWORD_REQUIRED" | translate }}
    </div>
  </div>

  <button
    type="submit"
    [disabled]="loginForm.invalid"
    class="btn btn-primary btn-form"
  >
    {{ "AUTH.LOGIN.SUBMIT" | translate }}
  </button>
  <p class="center-text">
    {{ "AUTH.LOGIN.NO_ACCOUNT" | translate }}
    <span
      ><a routerLink="/register" class="link">{{
        "AUTH.LOGIN.SIGN_UP" | translate
      }}</a></span
    >
  </p>
</form>
