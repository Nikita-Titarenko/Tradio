<form [formGroup]="registerForm" (ngSubmit)="onSubmit()" class="form-container">
  <h2 class="form-header">{{ "AUTH.REGISTER.TITLE" | translate }}</h2>
  <div class="form-group">
    <label for="name" class="label-text">{{
      "AUTH.FIELDS.NAME" | translate
    }}</label>
    <input
      id="name"
      type="text"
      formControlName="name"
      [placeholder]="'AUTH.FIELDS.NAME' | translate"
    />
    <div *ngIf="f['name'].invalid && f['name'].touched" class="error">
      {{ "AUTH.ERRORS.NAME_REQUIRED" | translate }}
    </div>
  </div>

  <div class="form-group">
    <label for="confirmPassword" class="label-text">{{
      "AUTH.FIELDS.CONFIRM_PASSWORD" | translate
    }}</label>
    <input
      id="confirmPassword"
      type="password"
      formControlName="confirmPassword"
      [placeholder]="'AUTH.FIELDS.CONFIRM_PASSWORD' | translate"
    />
    <div
      *ngIf="f['confirmPassword'].invalid && f['confirmPassword'].touched"
      class="error"
    >
      {{ "AUTH.ERRORS.CONFIRM_REQUIRED" | translate }}
    </div>
  </div>

  <button
    class="btn btn-primary btn-form"
    type="submit"
    [disabled]="registerForm.invalid"
  >
    {{ "AUTH.REGISTER.SUBMIT" | translate }}
  </button>
  <p class="center-text">
    {{ "AUTH.REGISTER.ALREADY_HAVE" | translate }}
    <span
      ><a routerLink="/login" class="link">{{
        "AUTH.REGISTER.SIGN_IN" | translate
      }}</a></span
    >
  </p>
</form>
