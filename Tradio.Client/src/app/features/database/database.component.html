<button class="btn btn-primary" (click)="exportInserts()">
  <i class="fas fa-file-export"></i> {{ "DATABASE.EXPORT_BTN" | translate }}
</button>

<div class="import-container">
  <div
    class="drop-zone"
    (click)="fileInput.click()"
    (dragover)="onDragOver($event)"
    (dragleave)="onDragLeave($event)"
    (drop)="onDrop($event)"
    [class.dragging]="isDragging"
  >
    <i class="fas fa-file-upload fa-3x"></i>
    <p *ngIf="!selectedFile">
      {{ "DATABASE.IMPORT.DROP_TEXT" | translate }}
    </p>
    <p *ngIf="selectedFile">
      <strong>{{ "DATABASE.IMPORT.SELECTED" | translate }}:</strong>
      {{ selectedFile.name }}
    </p>

    <input
      type="file"
      #fileInput
      (change)="onFileSelected($event)"
      accept=".sql"
      style="display: none"
    />
  </div>

  <button
    class="btn btn-secondary mt-3"
    [disabled]="!selectedFile"
    (click)="importBackup()"
  >
    <i class="fas fa-cloud-upload-alt"></i>
    {{ "DATABASE.IMPORT.UPLOAD_BTN" | translate }}
  </button>
</div>

<div *ngIf="sucessMessage" class="success">
  {{ sucessMessage | translate }}
</div>
<div *ngIf="errorMessage" class="error">
  {{ errorMessage | translate }}
</div>
